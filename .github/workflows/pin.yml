---
# Pins the formulas and cask to the latest stable Erebine/binaries
# release (or the tag given at dispatch) and commits the result to main.
name: Pin formulas to release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Erebine/binaries release tag to pin (default latest stable)
        required: false
        type: string

jobs:
  pin:
    name: Pin and commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Pin formulas and cask
        run: make update TAG="${{ inputs.tag }}"

      - name: Commit and push
        run: |
          VERSION="$(sed -n 's/^  version "\(.*\)"/\1/p' Formula/erectl.rb | head -1)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula Casks
          if git diff --cached --quiet; then
            echo "formulas already pinned to ${VERSION}; nothing to commit"
          else
            git commit -m "pin formulas and cask to ${VERSION}"
            git push
          fi
